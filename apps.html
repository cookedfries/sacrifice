<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Steam Library - Apps</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-darker: #232a2e;
  --bg-main: #2d353b;
  --bg-panel: #343f44;
  --border-color: #4f5b58;
  --text-primary: #d3c6aa;
  --text-muted: #859289;
  --steam-green: #a7c080;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: var(--bg-main);
  color: var(--text-primary);
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
}

#loader {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: var(--bg-darker);
  z-index: 9999999;
}
#loader.hidden { display: none; }

.library-layout {
  display: flex;
  height: 100vh;
  width: 100vw;
}

.sidebar {
  width: 240px;
  background: var(--bg-darker);
  border-right: 2px solid var(--border-color);
  display: flex;
  flex-direction: column;
}

.sidebar-header { padding: 10px; border-bottom: 1px solid var(--border-color); }

#search {
  width: 100%;
  background: var(--bg-panel);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 6px;
  outline: none;
}

.game-list { flex: 1; overflow-y: auto; padding: 5px 0; }

.game-list-item {
  padding: 6px 12px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-muted);
}
.game-list-item:hover, .game-list-item.active {
  background: var(--bg-panel);
  color: var(--steam-green);
}

.main-view { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }

.game-banner {
  padding: 24px;
  background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-main) 100%);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  gap: 20px;
  align-items: flex-end;
}

.game-banner-thumb {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border: 1px solid var(--border-color);
  background: var(--bg-darker);
}

.game-details h1 { margin: 0 0 10px 0; font-size: 24px; color: #fff; }

.play-btn {
  background: #7a9452;
  border: 1px solid var(--border-color);
  color: #fff;
  padding: 10px 30px;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}
.play-btn:hover { background: var(--steam-green); color: #232a2e; }

.game-info-body { padding: 20px; overflow-y: auto; flex: 1; }
.error { color: #e67e80; margin: 10px 0; }
</style>
</head>
<body>

<div id="loader">
  <div style="font-size:18px; font-weight:600;">Loading System Tools...</div>
</div>

<div class="library-layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <div style="font-weight:600; margin-bottom:6px; font-size:11px; text-transform:uppercase; color:var(--text-muted);">Applications (<span id="count">0</span>)</div>
      <input id="search" placeholder="Search Tools..." />
    </div>
    <div id="error" class="error" style="padding:10px;" hidden></div>
    <div class="game-list" id="appList"></div>
  </div>

  <div class="main-view" id="mainView" style="display: none;">
    <div class="game-banner">
      <div id="bannerThumbContainer"></div>
      <div class="game-details">
        <h1 id="selectedTitle">Select an Application</h1>
        <button class="play-btn" id="launchBtn">RUN UTILITY</button>
      </div>
    </div>
    <div class="game-info-body">
      <h3 style="color:var(--steam-green); border-bottom: 1px solid var(--border-color); padding-bottom:6px;">Application Properties</h3>
      <p style="color: var(--text-muted)">Ready to establish safe runtime configurations.</p>
    </div>
  </div>
</div>

<script>
const BASES = [
  "https://cdn.jsdelivr.net/gh/darkdragonzxs/apps@latest/",
  "https://raw.githubusercontent.com/darkdragonzxs/apps/main/",
  "https://raw.githack.com/darkdragonzxs/apps/main/"
];

const JSON_PATH = "apps.json";
const PREFIX = "/";

let apps = [];

const elList = document.getElementById("appList");
const elSearch = document.getElementById("search");
const elCount = document.getElementById("count");
const elError = document.getElementById("error");

function showError(msg) {
  elError.hidden = false;
  elError.textContent = msg;
}

async function fetchJSON() {
  for (const base of BASES) {
    try {
      const res = await fetch(base + JSON_PATH);
      if (!res.ok) continue;
      return await res.json();
    } catch {}
  }
  throw new Error();
}

async function fetchApp(path) {
  for (const base of BASES) {
    try {
      const res = await fetch(base + PREFIX + path);
      if (!res.ok) continue;
      return await res.text();
    } catch {}
  }
  throw new Error();
}

function renderSidebar(data, q = "") {
  const filtered = data.filter(a =>
    (a.title + (a.file_name || "")).toLowerCase().includes(q.toLowerCase())
  );

  elList.innerHTML = filtered.map(a => `
    <div class="game-list-item" data-path="${a.file_name || ""}" data-website="${a.website || ""}" data-title="${a.title}" data-thumb="${a.thumb}">
       <i class="fa-solid fa-box" style="margin-right:6px; opacity:0.5;"></i> ${a.title}
    </div>
  `).join("");

  elCount.textContent = filtered.length;

  document.querySelectorAll(".game-list-item").forEach(el => {
    el.onclick = () => {
      document.querySelectorAll(".game-list-item").forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      selectApp(el.dataset.title, el.dataset.path, el.dataset.website, el.dataset.thumb);
    };
  });
}

function selectApp(title, path, website, thumb) {
  document.getElementById("mainView").style.display = "flex";
  document.getElementById("selectedTitle").textContent = title;
  
  const clean = thumb ? thumb.replace(/^\/+/, '') : '';
  const imgUrl = clean ? (BASES[0] + PREFIX + clean) : '';
  
  document.getElementById("bannerThumbContainer").innerHTML = imgUrl ? 
    `<img class="game-banner-thumb" src="${imgUrl}">` : 
    `<div class="game-banner-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted)">No Image</div>`;

  document.getElementById("launchBtn").onclick = () => {
    if (website) {
      launchWebsite(website);
    } else if (path) {
      loadApp(path);
    }
  };
}

async function launchWebsite(target) {
  if(!/^(https?:\/\/|data:)/i.test(target)){
    target = "https://search.brave.com/search?q=" + encodeURIComponent(target);
  }
  let html = await fetch("https://cdn.jsdelivr.net/gh/darkdragonzxs/sandstone@latest/index.html").then(r => r.text());
  html = html.replace(/<\/script>/gi, '</scr' + 'ipt>');
  html = html.replace("</body>", `<scr`+`ipt>history.replaceState({}, "", "?url=${target}");location.search = "?url=${target}";</scr`+`ipt></body>`);
  const blob = new Blob([html], { type: "text/html" });
  location.href = URL.createObjectURL(blob) + "?url=" + target;
}

async function loadApp(path) {
  try {
    const html = await fetchApp(path);
    document.open();
    document.write(html);
    document.close();
  } catch {
    showError("Failed to load app.");
  }
}

elSearch.oninput = e => renderSidebar(apps, e.target.value);

(async () => {
  try {
    apps = await fetchJSON();
    renderSidebar(apps);
    document.getElementById("loader").classList.add("hidden");
  } catch {
    showError("Failed to load apps list.");
    document.getElementById("loader").classList.add("hidden");
  }
})();
</script>
</body>
</html>
