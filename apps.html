<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Steam Library - Apps</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root {
  --bg-darker: #1e2326;
  --bg-sidebar: #232a2e;
  --bg-main: #2d353b;
  --bg-panel: #343f44;
  --border-color: #3d484d;
  --text-primary: #d3c6aa;
  --text-muted: #859289;
  --steam-green: #a7c080;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: var(--bg-main);
  color: var(--text-primary);
  font-size: 13px;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

#loader {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-darker);
  z-index: 9999;
}
#loader.hidden { display: none; }

.sidebar {
  width: 260px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-search-container { padding: 10px; display: flex; gap: 6px; }
#search {
  flex: 1;
  background: var(--bg-darker);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 6px 10px;
  font-size: 12px;
  outline: none;
}

.sidebar-category {
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
}

.game-list-items { flex: 1; overflow-y: auto; }
.list-item {
  padding: 6px 20px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #b7c2b9;
}
.list-item:hover { background: var(--bg-panel); color: #fff; }

.main-dashboard { flex: 1; overflow-y: auto; padding: 20px 30px; }
.shelf-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 6px;
}

.grid-shelf {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 16px;
}

.grid-card {
  background: var(--bg-sidebar);
  border: 1px solid var(--border-color);
  aspect-ratio: 2 / 3;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}
.grid-card:hover { transform: scale(1.02); border-color: var(--steam-green); }
.thumb-img { width: 100%; height: 100%; object-fit: cover; }
.card-title-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(35, 42, 46, 0.95);
  padding: 8px; font-size: 12px; font-weight: 600; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
</style>
</head>
<body>

<div id="loader">
  <div style="color: var(--steam-green); font-weight: 600;">LOADING UTILITIES...</div>
</div>

<div class="sidebar">
  <div class="sidebar-search-container">
    <input id="search" placeholder="Search application registry" />
  </div>
  <div class="sidebar-category">
    <span>Apps (<span id="count">0</span>)</span>
    <i class="fa-solid fa-chevron-down"></i>
  </div>
  <div class="game-list-items" id="sidebarList"></div>
</div>

<div class="main-dashboard">
  <div class="shelf-title">All Applications</div>
  <div class="grid-shelf" id="gridShelf"></div>
</div>

<script>
const BASES = [
  "https://cdn.jsdelivr.net/gh/darkdragonzxs/apps@latest/",
  "https://raw.githubusercontent.com/darkdragonzxs/apps/main/",
  "https://raw.githack.com/darkdragonzxs/apps/main/"
];

const JSON_PATH = "apps.json";
const PREFIX = "/";

let apps = [];

async function fetchJSON() {
  for (const base of BASES) {
    try {
      const res = await fetch(base + JSON_PATH);
      if (res.ok) return await res.json();
    } catch {}
  }
  throw new Error();
}

function render(data, q = "") {
  const filtered = data.filter(a =>
    (a.title + (a.file_name || "")).toLowerCase().includes(q.toLowerCase())
  );

  document.getElementById("count").textContent = filtered.length;

  document.getElementById("sidebarList").innerHTML = filtered.map(a => `
    <div class="list-item" data-path="${a.file_name || ""}" data-web="${a.website || ""}">${a.title}</div>
  `).join("");

  document.getElementById("gridShelf").innerHTML = filtered.map(a => `
    <div class="grid-card" data-path="${a.file_name || ""}" data-web="${a.website || ""}">
      <img class="thumb-img" src="${BASES[0] + PREFIX + (a.thumb || '').replace(/^\/+/, '')}" onerror="this.style.display='none'">
      <div class="card-title-overlay">${a.title}</div>
    </div>
  `).join("");

  document.querySelectorAll(".list-item, .grid-card").forEach(el => {
    el.onclick = () => {
      if (el.dataset.web) {
        window.open(el.dataset.web, '_blank');
      } else if (el.dataset.path) {
        location.href = BASES[0] + PREFIX + el.dataset.path;
      }
    };
  });
}

document.getElementById("search").oninput = e => render(apps, e.target.value);

(async () => {
  try {
    apps = await fetchJSON();
    render(apps);
    document.getElementById("loader").classList.add("hidden");
  } catch {
    document.getElementById("loader").innerHTML = "<div>Error loading configuration tree.</div>";
  }
})();
</script>
</body>
</html>
