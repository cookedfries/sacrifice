<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
const DEFAULT_TITLE = "Steam";

function applySavedSettings(){
  const savedTitle = localStorage.getItem("z_title");
  const savedIcon = localStorage.getItem("z_icon");
  const savedLeave = localStorage.getItem("z_leave");

  document.title = savedTitle && savedTitle.trim() ? savedTitle : DEFAULT_TITLE;

  let icon = document.querySelector("link[rel='icon']");
  if(!icon){
    icon = document.createElement("link");
    icon.rel = "icon";
    document.head.appendChild(icon);
  }
  if(savedIcon && savedIcon.trim()){
    icon.href = savedIcon;
  }

  window.onbeforeunload = savedLeave === "true" ? () => true : null;
}
applySavedSettings();
</script>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color:#d3c6aa;
  background-color:#1e2326;
  overflow:hidden;
  user-select: none;
}

/* Modern Steam Style Top Navigation Header */
.steam-nav-header {
  background: #232a2e;
  border-bottom: 1px solid #2d353b;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 48px;
  box-sizing: border-box;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 24px;
}

.nav-tabs {
  display: flex;
  gap: 16px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
}

.nav-tabs span {
  color: #859289;
  cursor: pointer;
  text-transform: uppercase;
  padding: 14px 4px;
  border-bottom: 3px solid transparent;
  transition: color 0.2s;
}

.nav-tabs span:hover, .nav-tabs span.active {
  color: #a7c080;
}

.nav-tabs span.active {
  border-bottom-color: #a7c080;
}

.window-controls {
  display: flex;
  gap: 12px;
  color: #859289;
  font-size: 12px;
}

#mainViewport {
  position: absolute;
  top: 48px;
  left: 0;
  right: 0;
  bottom: 0;
  background: #2d353b;
}

#mainViewport iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>
<body>

<div class="steam-nav-header">
  <div class="nav-left">
    <div style="color: #a7c080; font-weight: 800; font-size: 18px; cursor: pointer;" onclick="loadPage('games.html')"><i class="fa-brands fa-steam"></i></div>
    <div class="nav-tabs">
      <span onclick="setActiveTab(this); loadPage('games.html')" class="active">Library</span>
      <span onclick="setActiveTab(this); loadPage('apps.html')">Apps</span>
      <span onclick="setActiveTab(this); window.open('https://discord.gg/cloudmoon','_blank')">Community</span>
      <span onclick="setActiveTab(this); loadPage('settings.html')">Settings</span>
    </div>
  </div>
  
  <div class="window-controls">
    <i class="fa-solid fa-minus"></i>
    <i class="fa-regular fa-square"></i>
    <i class="fa-solid fa-xmark"></i>
  </div>
</div>

<div id="mainViewport">
  <iframe id="clientFrame" src="games.html"></iframe>
</div>

<script>
const BASES=[
  "https://raw.githubusercontent.com/Darkdragonzxs/zd-pages/main/",
  "https://cdn.jsdelivr.net/gh/Darkdragonzxs/zd-pages@latest/",
  "https://raw.githack.com/Darkdragonzxs/zd-pages/main/"
];

function setActiveTab(element) {
  document.querySelectorAll('.nav-tabs span').forEach(tab => tab.classList.remove('active'));
  element.classList.add('active');
}

function safe(h){
  return h.replace(/<\/script>/gi,'</scr'+'ipt>');
}

async function fetchPage(f){
  for(const b of BASES){
    try{
      const r=await fetch(b+f);
      if(r.ok) return await r.text();
    }catch{}
  }
}

async function loadPage(f) {
  if (f.endsWith('.html')) {
    document.getElementById('clientFrame').src = f;
  }
}
</script>
</body>
</html>
