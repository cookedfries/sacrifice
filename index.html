<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
const DEFAULT_TITLE = "Steam Engine";

function applySavedSettings(){
  const savedTitle = localStorage.getItem("z_title");
  const savedIcon = localStorage.getItem("z_icon");
  const savedLeave = localStorage.getItem("z_leave");

  document.title = savedTitle && savedTitle.trim() ? savedTitle : DEFAULT_TITLE;

  let icon = document.querySelector("link[rel='icon']");
  if(!icon){
    icon = document.createElement("link");
    icon.rel = "icon";
    document.head.appendChild(icon);
  }
  if(savedIcon && savedIcon.trim()){
    icon.href = savedIcon;
  }

  window.onbeforeunload = savedLeave === "true" ? () => true : null;
}

applySavedSettings();

window.addEventListener("storage", e => {
  if(e.key === "z_title"){
    document.title = e.newValue && e.newValue.trim() ? e.newValue : DEFAULT_TITLE;
  }

  if(e.key === "z_icon"){
    let icon = document.querySelector("link[rel='icon']");
    if(!icon){
      icon = document.createElement("link");
      icon.rel = "icon";
      document.head.appendChild(icon);
    }
    if(e.newValue && e.newValue.trim()){
      icon.href = e.newValue;
    }
  }

  if(e.key === "z_leave"){
    window.onbeforeunload = e.newValue === "true" ? () => true : null;
  }
});
</script>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color:#d3c6aa;
  background-color:#2d353b;
  overflow:hidden;
}

/* Classic 2000s Steam Top Windows Style Header Bar */
.steam-header {
  background: #3a444a;
  border-bottom: 2px solid #4f5b58;
  padding: 4px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 40px;
  box-sizing: border-box;
}

.steam-menu {
  display: flex;
  gap: 12px;
  font-size: 13px;
}

.steam-menu span {
  color: #859289;
  cursor: pointer;
}

.steam-menu span:hover {
  color: #a7c080;
}

.topbar{
  display:flex;
  gap:2px;
  background:#232a2e;
  padding:3px;
  border: 1px solid #4f5b58;
}

.topbar button{
  background:#343f44;
  border:1px solid #4f5b58;
  color:#d3c6aa;
  cursor:pointer;
  padding: 4px 14px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
}

.topbar button:hover{
  background:#a7c080;
  color:#2d353b;
}

#homeUI{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  width: 400px;
  background: #2b3339;
  border: 2px solid #4f5b58;
  padding: 30px;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

.title{
  font-size:36px;
  font-weight:700;
  color: #a7c080;
  letter-spacing:2px;
  text-shadow: 1px 1px #1e2326;
}

.clock{
  width:80px;
  height:80px;
  border-radius:50%;
  border:2px solid #4f5b58;
  position:relative;
  background: #232a2e;
}

.hand{
  position:absolute;
  left:50%;
  bottom:50%;
  transform-origin:bottom;
  transform:translateX(-50%);
  background:#a7c080;
}

.hour{height:20px;width:2px;}
.minute{height:28px;width:2px;opacity:0.8;}
.second{height:34px;width:1px;color:#e67e80;}

.search{
  position:relative;
  width:100%;
}

.search input{
  width:100%;
  padding: 8px 10px 8px 34px;
  box-sizing: border-box;
  border:1px solid #4f5b58;
  background:#232a2e;
  color:#d3c6aa;
  font-size:13px;
}

.search i{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:13px;
  color:#859289;
  pointer-events:none;
}

#frameOverlay{
  position:absolute;
  top:40px;
  left:0;
  right:0;
  bottom:0;
  z-index:9999;
  pointer-events:none;
  background: #2d353b;
}

#frameOverlay iframe{
  width:100%;
  height:100%;
  border:none;
  background:transparent;
  pointer-events:auto;
}
</style>
</head>

<body>

<div class="steam-header">
  <div class="steam-menu">
    <span>Steam</span>
    <span>View</span>
    <span>Friends</span>
    <span>Games</span>
    <span>Help</span>
  </div>

  <div class="topbar">
    <button onclick="goHome()"><i class="fa-solid fa-house"></i> Library</button>
    <button onclick="loadPage('games.html')"><i class="fa-solid fa-gamepad"></i> Games</button>
    <button onclick="loadPage('apps.html')"><i class="fa-solid fa-box"></i> Apps</button>
    <button onclick="window.open('https://discord.gg/cloudmoon','_blank')"><i class="fa-brands fa-discord"></i> Chat</button>
    <button onclick="loadPage('settings.html')"><i class="fa-solid fa-gear"></i> Settings</button>
  </div>
</div>

<div id="homeUI">
  <div class="title">STEAM_ENGINE</div>

  <div class="clock">
    <div class="hand hour" id="h"></div>
    <div class="hand minute" id="m"></div>
    <div class="hand second" id="s"></div>
  </div>

  <div class="search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="searchBox" placeholder="Search internet client store...">
  </div>
</div>

<div id="frameOverlay"></div>

<script>
const BASES=[
  "https://raw.githubusercontent.com/Darkdragonzxs/zd-pages/main/",
  "https://cdn.jsdelivr.net/gh/Darkdragonzxs/zd-pages@latest/",
  "https://raw.githack.com/Darkdragonzxs/zd-pages/main/"
];

function updateClock(){
  const n=new Date();
  const h=n.getHours()%12;
  const m=n.getMinutes();
  const s=n.getSeconds();

  document.getElementById("h").style.transform=`translateX(-50%) rotate(${h*30+m/2}deg)`;
  document.getElementById("m").style.transform=`translateX(-50%) rotate(${m*6}deg)`;
  document.getElementById("s").style.transform=`translateX(-50%) rotate(${s*6}deg)`;
}
setInterval(updateClock,1000);
updateClock();

function safe(h){
  return h.replace(/<\/script>/gi,'</scr'+'ipt>');
}

async function fetchPage(f){
  for(const b of BASES){
    try{
      const r=await fetch(b+f);
      if(r.ok) return await r.text();
    }catch{}
  }
}

async function loadPage(f){
  const html=safe(await fetchPage(f));
  const blob=new Blob([html],{type:"text/html"});
  openFrame(URL.createObjectURL(blob));
}

function openFrame(url){
  document.getElementById("homeUI").style.display="none";
  const container=document.getElementById("frameOverlay");
  container.innerHTML="";
  const iframe=document.createElement("iframe");
  iframe.src=url;
  container.appendChild(iframe);
}

function goHome(){
  document.getElementById("frameOverlay").innerHTML="";
  document.getElementById("homeUI").style.display="flex";
}

document.getElementById("searchBox").addEventListener("keydown",e=>{
  if(e.key!=="Enter") return;

  let v=e.target.value.trim();
  if(!v) return;

  let url=v.startsWith("http")
    ? v
    : "https://search.brave.com/search?q="+encodeURIComponent(v);

  launchBrowser(url);
});

async function launchBrowser(target){
  if(!/^(https?:\/\/|data:)/i.test(target)){
    target = "https://html.duckduckgo.com/?q=" + encodeURIComponent(target);
  }

  let html = await fetch("https://cdn.jsdelivr.net/gh/darkdragonzxs/sandstone@latest/index.html")
    .then(r => r.text());

  html = html.replace(/<\/script>/gi, '</scr' + 'ipt>');

  html = html.replace(
    "</body>",
    `<scr`+`ipt>
history.replaceState({}, "", "#${target}");
location.hash = "${target}";
</scr`+`ipt></body>`
  );

  const blob = new Blob([html], { type: "text/html" });
  const blobUrl = URL.createObjectURL(blob);

  openFrame(blobUrl + "#" + target);
}
</script>
</body>
</html>
