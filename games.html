<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Steam Library</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root {
  --bg-darker: #1e2326;
  --bg-sidebar: #232a2e;
  --bg-main: #2d353b;
  --bg-panel: #343f44;
  --border-color: #3d484d;
  --text-primary: #d3c6aa;
  --text-muted: #859289;
  --steam-green: #a7c080;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: var(--bg-main);
  color: var(--text-primary);
  font-size: 13px;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

#loader {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-darker);
  z-index: 9999;
}
#loader.hidden { display: none; }

/* Sidebar UI Layout */
.sidebar {
  width: 260px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-search-container {
  padding: 10px;
  display: flex;
  gap: 6px;
}

#search {
  flex: 1;
  background: var(--bg-darker);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 6px 10px;
  font-size: 12px;
  outline: none;
}

.sidebar-category {
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.game-list-items {
  flex: 1;
  overflow-y: auto;
}

.list-item {
  padding: 6px 20px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #b7c2b9;
  font-size: 13px;
}
.list-item:hover {
  background: var(--bg-panel);
  color: #fff;
}

/* Main Shelf View UI */
.main-dashboard {
  flex: 1;
  overflow-y: auto;
  padding: 20px 30px;
}

.shelf-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 6px;
}

/* Recent shelf: landscape style layout */
.recent-shelf {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 30px;
}

.recent-card {
  background: var(--bg-sidebar);
  border: 1px solid var(--border-color);
  aspect-ratio: 16 / 9;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

/* All games shelf: poster card layout matching image grid */
.grid-shelf {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 16px;
}

.grid-card {
  background: var(--bg-sidebar);
  border: 1px solid var(--border-color);
  aspect-ratio: 2 / 3; /* Vertical alignment grid */
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}

.grid-card:hover, .recent-card:hover {
  transform: scale(1.02);
  border-color: var(--steam-green);
}

.thumb-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-title-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(35, 42, 46, 0.95);
  padding: 8px;
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
</style>
</head>
<body>

<div id="loader">
  <div style="color: var(--steam-green); font-weight: 600;">LOADING LIBRARY...</div>
</div>

<div class="sidebar">
  <div class="sidebar-search-container">
    <input id="search" placeholder="Search by name" />
  </div>
  <div class="sidebar-category">
    <span>Games (<span id="count">0</span>)</span>
    <i class="fa-solid fa-chevron-down"></i>
  </div>
  <div class="game-list-items" id="sidebarList"></div>
</div>

<div class="main-dashboard">
  <div class="shelf-title">Recent Games</div>
  <div class="recent-shelf" id="recentShelf"></div>

  <div class="shelf-title">All Games</div>
  <div class="grid-shelf" id="gridShelf"></div>
</div>

<script>
const BASES = [
  "https://cdn.jsdelivr.net/gh/Hydra-Network/hydra-assets@main/",
  "https://raw.githubusercontent.com/Hydra-Network/hydra-assets/main/",
  "https://raw.githack.com/Hydra-Network/hydra-assets/main/"
];

const JSON_PATH = "gmes.json";
const GAME_PREFIX = "gmes/";
const THUMB_PREFIX = "/";

let games = [];

async function fetchJSON() {
  for (const base of BASES) {
    try {
      const res = await fetch(base + JSON_PATH);
      if (res.ok) return await res.json();
    } catch {}
  }
  throw new Error();
}

async function loadGame(path) {
  try {
    for (const base of BASES) {
      try {
        const res = await fetch(base + GAME_PREFIX + path);
        if (!res.ok) continue;
        const html = await res.text();
        const safe = html.replace(/<\/script>/gi, '</scr' + 'ipt>');
        document.open();
        document.write(safe);
        document.close();
        return;
      } catch {}
    }
  } catch {
    alert("Failed to load game.");
  }
}

function buildImageUrl(path) {
  if (!path) return "";
  return BASES[0] + THUMB_PREFIX + path.replace(/^\/+/, '');
}

function render(data, q = "") {
  const filtered = data.filter(g =>
    (g.title + g.file_name).toLowerCase().includes(q.toLowerCase())
  );

  document.getElementById("count").textContent = filtered.length;

  // Render Left Text Sidebar List
  const elSidebar = document.getElementById("sidebarList");
  elSidebar.innerHTML = filtered.map(g => `
    <div class="list-item" data-path="${g.file_name}">${g.title}</div>
  `).join("");

  // Render Recent Shelf Layout (First 3 items)
  const elRecent = document.getElementById("recentShelf");
  elRecent.innerHTML = filtered.slice(0, 3).map(g => `
    <div class="recent-card" data-path="${g.file_name}">
      <img class="thumb-img" src="${buildImageUrl(g.thumb)}" onerror="this.style.display='none'">
      <div class="card-title-overlay">${g.title}</div>
    </div>
  `).join("");

  // Render Main Vertical Content Poster Grid Layout
  const elGrid = document.getElementById("gridShelf");
  elGrid.innerHTML = filtered.map(g => `
    <div class="grid-card" data-path="${g.file_name}">
      <img class="thumb-img" src="${buildImageUrl(g.thumb)}" onerror="this.style.display='none'">
      <div class="card-title-overlay">${g.title}</div>
    </div>
  `).join("");

  // Attach Action Events
  document.querySelectorAll(".list-item, .recent-card, .grid-card").forEach(el => {
    el.onclick = () => loadGame(el.dataset.path);
  });
}

document.getElementById("search").oninput = e => render(games, e.target.value);

(async () => {
  try {
    games = await fetchJSON();
    render(games);
    document.getElementById("loader").classList.add("hidden");
  } catch {
    document.getElementById("loader").innerHTML = "<div style='color:red;'>Failed to populate client inventory.</div>";
  }
})();
</script>
</body>
</html>
