<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; }
body{
  margin:0;
  font-family:"Segoe UI", sans-serif;
  color:#d3c6aa;
  background:#2d353b;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:500px;
  background: #232a2e;
  border: 1px solid #3d484d;
  padding: 24px;
}

h2{
  margin-top: 0;
  margin-bottom: 20px;
  font-weight:600;
  color: #fff;
  border-bottom: 1px solid #3d484d;
  padding-bottom: 8px;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.section{
  margin-bottom:16px;
  padding:14px;
  background:#2d353b;
  border:1px solid #3d484d;
}

.label{
  font-size:11px;
  font-weight: 600;
  color: #a7c080;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input{
  width:100%;
  margin-top:8px;
  padding:8px;
  border:1px solid #3d484d;
  background:#1e2326;
  color:#d3c6aa;
  outline:none;
}

button{
  width:100%;
  margin-top:10px;
  padding:8px;
  border:1px solid #3d484d;
  background:#343f44;
  color:white;
  cursor:pointer;
  font-weight: 600;
}

button:hover{
  background:#a7c080;
  color: #1e2326;
}

.toggle-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:14px;
}

.switch {
  position: relative;
  display: inline-block;
  width: 40px;
  height: 20px;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #1e2326;
  border: 1px solid #3d484d;
}
.slider:before {
  position: absolute;
  content: "";
  height: 14px;
  width: 14px;
  left: 2px;
  bottom: 2px;
  background-color: #859289;
}
input:checked + .slider { background-color: #4b564c; }
input:checked + .slider:before {
  transform: translateX(20px);
  background-color: #a7c080;
}
</style>
</head>

<body>
<div class="container">
  <h2>Client Settings</h2>

  <div class="section">
    <div class="label">Custom App Name Header</div>
    <input id="title" placeholder="Steam">
    <button onclick="saveTitle()">Change Application Title</button>
  </div>

  <div class="section">
    <div class="label">Client Favicon Asset URL</div>
    <input id="favicon" placeholder="https://google.com/favicon.ico">
    <button onclick="saveFavicon()">Modify Shell Icon</button>
  </div>

  <div class="section">
    <button onclick="openBlank()">Force Instance sandbox (about:blank)</button>
    <div class="toggle-row">
      <span style="font-size: 12px; color: var(--text-muted)">Show warning message on window termination</span>
      <label class="switch">
        <input type="checkbox" id="leaveToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>
</div>

<script>
const leave = localStorage.getItem("z_leave");
if(leave === "true"){
  document.getElementById("leaveToggle").checked = true;
}

function saveTitle(){
  const val = document.getElementById("title").value.trim();
  if(val) localStorage.setItem("z_title", val);
}

function saveFavicon(){
  let val = document.getElementById("favicon").value.trim();
  if(!val) return;
  let url = val.startsWith("http") ? val : "https://favicon.nextdns.io/" + val;
  localStorage.setItem("z_icon", url);
}

document.getElementById("leaveToggle").onchange = e => {
  localStorage.setItem("z_leave", e.target.checked ? "true" : "false");
};

function openBlank(){
  const win = window.open("about:blank", "_blank");
  win.document.write(`<iframe src="${location.origin}" style="border:none;width:100vw;height:100vh;margin:0;padding:0;"></iframe>`);
}
</script>
</body>
</html>
